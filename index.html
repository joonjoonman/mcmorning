<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>준준의 맥모닝 체크</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background-color: #e8e8e8;
      overflow: hidden;
    }
    .iframe-wrapper { width: 100%; height: 100%; overflow: hidden; }
    iframe {
      width: 100%;
      height: calc(100% + 50px);
      margin-top: -50px;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <div class="iframe-wrapper">
    <iframe id="gas-frame"></iframe>
  </div>
  <script>
    // ?ref=instagram 등 쿼리스트링을 GAS URL에 그대로 전달
    var base = 'https://script.google.com/macros/s/AKfycbzsGqk1AGbXiptRip-b8Zj0pzg7ohDFk0uZYMdu34FRlED6SeMDSIdXDEXX253pPAIY/exec';
    var qs   = window.location.search; // 예: "?ref=instagram"
    document.getElementById('gas-frame').src = base + qs;
  </script>
</body>
</html>
