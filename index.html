<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>준준의 맥모닝 체크</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #e8e8e8; /* 기존 맥모닝 앱 배경색과 맞춤 */
      overflow: hidden; /* 이중 스크롤바 방지 */
    }
    .iframe-wrapper {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      /* 상단 배너 높이(약 50px)만큼 위로 당기고, 아래쪽 길이를 늘려줍니다 */
      height: calc(100% + 50px);
      margin-top: -50px; 
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <div class="iframe-wrapper">
    <iframe src="https://script.google.com/macros/s/AKfycbxWHzIrLw3c_1t1oir63Au9EyT5LYzrf1Ek5oAU2kT7TELtsT6RjiHpeiHeBfhAnycx/exec"></iframe>
  </div>
</body>
</html>
